name: Audit Tool Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit current Copilot tool coverage
        run: python scripts/audit_tool_coverage.py
