name: Validate Customizations

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate customization files
        run: python scripts/validate_customizations.py

      - name: Syntax check helper scripts
        run: python -m py_compile scripts/install.py scripts/validate_customizations.py
